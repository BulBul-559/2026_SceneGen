pipeline:
  mode: procedural_front3d
  scenes: 10
  seed: 20260517
  output_dir: results
  run_name: null
  clean: false
  index_start: 0

front3d:
  manifest: data/3D-Front/scenegen_manifest.json
  source_dir: data/3D-Front/3D-FRONT
  arch_variant: raw
  object_variant: raw
  openings:
    mode: doors
    dilation_m: 0.0
    floor_tolerance_m: 0.25
    min_height_m: 1.6
    include_doors_as_wall: true
    include_windows_as_wall: true

procedural:
  layout: split_tree
  room_count: [3, 6]
  room_width_m: [3.2, 5.8]
  room_length_m: [3.2, 6.4]
  room_height_m: [2.8, 3.4]
  room_types: [LivingRoom, Bedroom, DiningRoom, StudyRoom]
  wall_thickness_m: 0.16
  door_width_m: 1.0
  windows:
    enabled: true
    room_probability: 0.65
    max_per_room: 1
    width_m: [0.8, 1.6]
    height_m: [0.8, 1.2]
    sill_height_m: [0.85, 1.1]
    wall_margin_m: 0.8
  object_count:
    strategy: area_adaptive
    range: [3, 7]
    min: 2
    max: 9
    area_per_object_m2: 4.0
    jitter: [-1, 1]
  room_profiles:
    default:
      classes: [seat, table, floor, seat, table]
      filters: {}
    LivingRoom:
      classes: [seat, table, floor, seat, table]
      filters:
        seat:
          super_category: [sofa]
    Bedroom:
      classes: [floor, table, table, seat]
      filters:
        floor:
          super_category: [bed]
        table:
          category: [nightstand]
    DiningRoom:
      classes: [table, seat, seat, seat, seat]
      filters:
        table:
          category: [dining]
        seat:
          category: [dining chair]
    StudyRoom:
      classes: [table, seat, floor]
      filters:
        table:
          category: [desk]
        seat:
          category: [chair]
  wall_margin_m: 0.25
  object_margin_m: 0.15
  placement_policy:
    default:
      zone: anywhere
      wall_offset_m: 0.0
      center_radius_ratio: 0.35
    table:
      zone: center
      wall_offset_m: 0.0
      center_radius_ratio: 0.25
    seat:
      zone: anywhere
      wall_offset_m: 0.0
      center_radius_ratio: 0.35
    floor:
      zone: wall
      wall_offset_m: 0.05
      center_radius_ratio: 0.35
  placement_groups:
    enabled: true
    room_types:
      DiningRoom:
        - name: dining_table_set
          anchor_class: table
          companion_class: seat
          companion_count: [2, 4]
          companion_gap_m: [0.1, 0.35]
          max_attempts: 30
      Bedroom:
        - name: bed_side_tables
          anchor_class: floor
          companion_class: table
          companion_count: [1, 2]
          companion_gap_m: [0.05, 0.25]
          max_attempts: 30
      StudyRoom:
        - name: desk_chair_pair
          anchor_class: table
          companion_class: seat
          companion_count: [1, 1]
          companion_gap_m: [0.1, 0.3]
          max_attempts: 20
  max_attempts_per_object: 80
  asset_pool_limit: 500
  precheck:
    enabled: true
    max_attempts_per_scene: 5
    min_placements: 1
    min_placement_ratio: 0.5
    max_skipped_ratio: 0.8
    require_connected_rooms: true

validation:
  sionna: false

quality:
  enabled: true
  fail_on_error: true
  collision_padding_m: 0.0
  bistro_static_clearance_m: 0.0
  support_tolerance_m: 0.05

label:
  enabled: true
  fail_on_error: true
  ue:
    height_m: 1.6
    sampling:
      domain: global_floor
      grid_m: [0.1]
      mask_resolution_m: 0.05
      wall_clearance_m: 0.2
      min_component_area_m2: 0.25
      strategies: [walk]
    walk:
      furniture_clearance_m: 0.1
      obstacle_strategy: below_ue_column
      ignore_low_obstacles_below_m: 0.10
      blocking_classes: [table, seat, floor]
    connected_area:
      room_id: "__corridor__"
      room_type: ConnectedArea
  bs:
    strategy: wall_or_corner
    height_m: 2.4
    ceiling_margin_m: 0.3
    wall_clearance_m: 0.2
    count:
      strategy: fixed_per_room
      per_room: 4
      min_per_room: 1
      max_per_room: 8
      min_room_area_m2: 4.0
      area_per_point_m2: 12.0
    center:
      enabled: true
      initial_radius_m: 0.2
      radius_step_m: 0.1
      max_radius_m: 2.0
  overlay:
    enabled: true

floorplan:
  enabled: true
  fail_on_error: true
  resolution_m: 0.05
  geometry:
    enabled: true
    projection: sampling
    height:
      mode: heights
      values_m: [1.6]
      step_m: 0.2
      top_m: null
      bottom_m: 0.0
  class_mask:
    enabled: true
    wall_dilation_m: 0.0
    furniture_dilation_m: 0.05
    furniture_mode: mesh
    furniture_height_m: 1.6
  sampling:
    density_scale: 128.0
    min_points: 100000
    max_points: 4000000
  preview:
    tile_size_px: 360

postprocess:
  maps:
    scene_glob: procedural_front3d_*
  dataset:
    scene_glob: procedural_front3d_*
