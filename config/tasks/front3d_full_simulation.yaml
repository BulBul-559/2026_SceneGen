pipeline:
  mode: front3d
  scenes: 1
  seed: 20260517
  output_dir: results
  run_name: null
  clean: false
  index_start: 0

front3d:
  manifest: data/3D-Front/scenegen_manifest.json
  source_dir: data/3D-Front/3D-FRONT
  arch_variant: normalized
  object_variant: raw
  scene_ids: []
  select: sequential
  start_index: 0
  use_replace_jid: true
  skip_missing_objects: true
  positive_xy: true
  ground: true
  precheck:
    enabled: true
    max_attempts_per_scene: 20
    min_placements: 1
    max_z_m: 8.0
    max_footprint_ratio: 5.0
  openings:
    mode: doors
    dilation_m: 0.0
    floor_tolerance_m: 0.25
    min_height_m: 1.6
    include_doors_as_wall: true
    include_windows_as_wall: true

validation:
  sionna: false

quality:
  enabled: true
  fail_on_error: true
  collision_padding_m: 0.0
  bistro_static_clearance_m: 0.0
  support_tolerance_m: 0.05

label:
  enabled: true
  fail_on_error: true
  ue:
    height_m: 1.6
    sampling:
      domain: global_floor
      grid_m: [0.1, 0.2, 0.4, 0.5]
      wall_clearance_m: 0.2
      min_component_area_m2: 0.25
      strategies: [panel, walk]
    walk:
      furniture_clearance_m: 0.1
      obstacle_strategy: below_ue_column
      ignore_low_obstacles_below_m: 0.10
      blocking_classes: [table, seat, floor]
    connected_area:
      room_id: "__corridor__"
      room_type: ConnectedArea
  bs:
    strategy: wall_or_corner
    height_m: 2.4
    ceiling_margin_m: 0.3
    wall_clearance_m: 0.2
    count:
      strategy: fixed_per_room
      per_room: 4
      min_per_room: 1
      max_per_room: 8
      min_room_area_m2: 4.0
      area_per_point_m2: 12.0
    center:
      enabled: true
      initial_radius_m: 0.2
      radius_step_m: 0.1
      max_radius_m: 2.0
  overlay:
    enabled: true

floorplan:
  enabled: true
  fail_on_error: true
  resolution_m: 0.05
  geometry:
    enabled: true
    projection: sampling
    height:
      mode: heights
      values_m: [1.6]
      step_m: 0.2
      top_m: null
      bottom_m: 0.0
  class_mask:
    enabled: true
    wall_dilation_m: 0.0
    furniture_dilation_m: 0.05
    furniture_mode: mesh
    furniture_height_m: 1.6
  sampling:
    density_scale: 128.0
    min_points: 100000
    max_points: 25000000
  preview:
    tile_size_px: 360

postprocess:
  maps:
    enabled: false
    workers: null
    scene_glob: front3d_*
    overwrite: false
    r_max_m: 3.0
    los_stride_px: 4
    snap_radius_m: 0.25
    bs_label:
      mode: name
      name: label_panel_0p1
      glob: null
  dataset:
    enabled: false
    output_dir: datasets
    name: null
    scene_glob: front3d_*
    require_maps: true
    overwrite: false
