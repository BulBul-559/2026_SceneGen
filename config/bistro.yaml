pipeline:
  mode: bistro
  scenes: 10
  seed: 20260517
  output_dir: results
  run_name: null
  clean: false

assets:
  catalog: data/catalogs/bistro.v1.json

bistro:
  base_dir: data/scene
  forbidden_xy:
    - [1.0, 11.0, 4.5, 16.0]
    - [8.0, 8.0, 14.0, 10.0]

placement:
  tables: [4, 8]
  floor_extras: 6
  tabletop_items: [3, 9]
  bistro_support_items: 18
  max_attempts: 300

validation:
  sionna: false

quality:
  enabled: true
  fail_on_error: true
  collision_padding_m: 0.0
  bistro_static_clearance_m: 0.0
  support_tolerance_m: 0.05

label:
  enabled: true
  fail_on_error: true
  ue:
    height_m: 1.6
    sampling:
      domain: global_floor
      grid_m: [0.1]
      wall_clearance_m: 0.2
      min_component_area_m2: 0.25
      strategies: [walk]
    walk:
      furniture_clearance_m: 0.1
      obstacle_strategy: below_ue_column
      ignore_low_obstacles_below_m: 0.10
      blocking_classes: [table, seat, floor]
    connected_area:
      room_id: "__corridor__"
      room_type: ConnectedArea
  bs:
    strategy: wall_or_corner
    height_m: 2.4
    ceiling_margin_m: 0.3
    wall_clearance_m: 0.2
    count:
      strategy: fixed_per_room
      per_room: 4
      min_per_room: 1
      max_per_room: 8
      min_room_area_m2: 4.0
      area_per_point_m2: 12.0
    center:
      enabled: true
      initial_radius_m: 0.2
      radius_step_m: 0.1
      max_radius_m: 2.0
  overlay:
    enabled: true

floorplan:
  enabled: true
  fail_on_error: true
  resolution_m: 0.05
  geometry:
    enabled: true
    projection: sampling
    height:
      mode: heights
      values_m: [1.6]
      step_m: 0.2
      top_m: null
      bottom_m: 0.0
  sampling:
    density_scale: 128.0
    min_points: 100000
    max_points: 25000000
  preview:
    tile_size_px: 360
