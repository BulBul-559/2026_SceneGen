pipeline:
  mode: bistro
  scenes: 10
  seed: 20260517
  output_dir: results
  run_name: null
  clean: false

assets:
  catalog: data/catalogs/bistro.v1.json

bistro:
  base_dir: data/scene
  forbidden_xy:
    - [1.0, 11.0, 4.5, 16.0]
    - [8.0, 8.0, 14.0, 10.0]

front3d:
  manifest: data/3D-Front/scenegen_manifest.json
  source_dir: data/3D-Front/3D-FRONT
  arch_variant: normalized
  object_variant: raw
  scene_ids: []
  select: random
  use_replace_jid: true
  skip_missing_objects: true
  positive_xy: true
  ground: true
  precheck:
    enabled: true
    max_attempts_per_scene: 20
    min_placements: 1
    max_z_m: 8.0
    max_footprint_ratio: 5.0
  openings:
    mode: doors
    dilation_m: 0.0
    floor_tolerance_m: 0.25
    min_height_m: 1.6
    include_doors_as_wall: true
    include_windows_as_wall: true

placement:
  tables: [4, 8]
  floor_extras: 6
  tabletop_items: [3, 9]
  bistro_support_items: 18
  max_attempts: 300

validation:
  sionna: false

quality:
  enabled: true
  fail_on_error: true
  collision_padding_m: 0.0
  bistro_static_clearance_m: 0.0
  support_tolerance_m: 0.05

label:
  enabled: true
  fail_on_error: true
  ue:
    height_m: 1.6
    sampling_domain: global_floor
    wall_clearance_m: 0.2
    furniture_clearance_m: 0.35
    obstacle_strategy: height_aware
    ignore_low_obstacles_below_m: 0.10
    blocking_classes: [table, seat, floor]
    min_component_area_m2: 0.25
    connected_area:
      room_id: "__corridor__"
      room_type: ConnectedArea
    variants:
      strategies: [walk]
      grid_m: [0.1]
      connected: [true]
  bs:
    strategy: wall_or_corner
    height_m: 2.4
    ceiling_margin_m: 0.3
    wall_clearance_m: 0.2
    count:
      strategy: fixed_per_room
      per_room: 4
      min_per_room: 1
      max_per_room: 8
      min_room_area_m2: 4.0
      area_per_point_m2: 12.0
    center:
      initial_radius_m: 0.2
      radius_step_m: 0.1
      max_radius_m: 2.0
  overlay:
    enabled: true

floorplan:
  enabled: true
  fail_on_error: true
  resolution_m: 0.05
  geometry:
    enabled: true
    clean:
      enabled: false
      min_density: 2.0
      min_neighbors: 2
      min_z_m: 0.05
      max_abs_normal_z: 0.7
      opening_px: 0
      closing_px: 1
  semantic:
    enabled: false
    padding_m: 0.5
    draw_labels: true
  class_mask:
    enabled: false
    wall_dilation_m: 0.0
    furniture_dilation_m: 0.0
  height:
    mode: heights
    values_m: [1.6]
    step_m: 0.2
    top_m: null
    bottom_m: 0.0
  sampling:
    density_scale: 128.0
    min_points: 100000
    max_points: 25000000
  preview:
    tile_size_px: 360
